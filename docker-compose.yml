version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pf-tweet-db
    restart: always
    environment:
      POSTGRES_DB: pftweet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pf-tweet-backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=pftweet
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_PORT=5432
      - DJANGO_SECRET_KEY=dev_secret_key_123
      - DJANGO_DEBUG=True
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: pf-tweet-frontend
    restart: always
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
